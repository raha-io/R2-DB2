# Dev compose for Cisco VPN / systemd-resolved environments.
# Uses network_mode: host so all containers share the host network stack,
# giving access to /etc/hosts entries (pypi.org, chat-ai.example.com)
# and the 127.0.0.53 stub resolver.
#
# ClickHouse is NOT run locally — the app connects to the ClickHouse cluster via
# a kubectl port-forward on 127.0.0.1:8123. Start the port-forward before
# bringing up `app` (see README.md).
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml up -d --no-deps --no-build openwebui
#
# Services bind directly to host ports (no port mapping needed):
#   app         → :8000
#   postgres    → :5432
#   redis       → :6379
#   qdrant      → :6333, :6334
#   openwebui   → :8080  (http://localhost:8080)

services:
  # ── Application ──
  app:
    network_mode: host
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_IMAGE_REGISTRY: ${PUBLIC_IMAGE_REGISTRY}
        LOCAL_ARTIFACTORY_ADDRESS: ${LOCAL_ARTIFACTORY_ADDRESS}
        PIP_REPO_URL: ${PIP_REPO_URL}
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # With bridge networking, use service names
      CLICKHOUSE__HOST: 127.0.0.1
      POSTGRES__HOST: 127.0.0.1
      REDIS__HOST: 127.0.0.1
      QDRANT__HOST: 127.0.0.1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./artifacts:/app/artifacts
    restart: unless-stopped

  # ── PostgreSQL (LangGraph checkpointer) ──
  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_DB: r2_db2_checkpoints
      POSTGRES_USER: r2-db2
      POSTGRES_PASSWORD: r2_db2_secret
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U r2-db2 -d r2_db2_checkpoints"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    network_mode: host

  # ── Redis (caching) ──
  redis:
    image: redis:8-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    network_mode: host

  # ── Qdrant (semantic search) ──
  qdrant:
    image: qdrant/qdrant:v1.17.0
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    network_mode: host

  # ── Open WebUI ──
  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    environment:
      # Disable Ollama (we don't use it)
      - ENABLE_OLLAMA_API=false
      # OpenRouter + local R2-DB2 analyst (semicolon-separated)
      - OPENAI_API_BASE_URLS=http://127.0.0.1:8000/v1;${OPENAI_API_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENAI_API_KEYS=sk-dummy;${OPENAI_API_KEY:-}
      # Enable API keys for programmatic access
      - ENABLE_API_KEYS=true
      # Disable signup after admin is created
      - ENABLE_SIGNUP=true
      - DEFAULT_USER_ROLE=user
      # Webui name
      - WEBUI_NAME=R2-DB2 Analytics
      # Default admin credentials (auto-created on first startup when no users exist)
      - WEBUI_ADMIN_EMAIL=${OPENWEBUI_ADMIN_EMAIL:-admin@admin.com}
      - WEBUI_ADMIN_PASSWORD=${OPENWEBUI_ADMIN_PASSWORD:-admin}
      # Disable background LLM calls that would consume the graph's paused
      # interrupt state before the user's real clarification reply arrives.
      - ENABLE_TITLE_GENERATION=False
      - ENABLE_TAGS_GENERATION=False
      - ENABLE_FOLLOW_UP_GENERATION=False
      - ENABLE_AUTOCOMPLETE_GENERATION=False
      # Ensure env vars take precedence over DB-persisted config
      - ENABLE_PERSISTENT_CONFIG=False
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  open-webui:
