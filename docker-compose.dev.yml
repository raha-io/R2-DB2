# Dev compose for Cisco VPN / systemd-resolved environments.
# Uses network_mode: host so all containers share the host network stack,
# giving access to /etc/hosts entries (pypi.org, chat-ai.example.com)
# and the 127.0.0.53 stub resolver.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml up -d --no-deps --no-build openwebui
#
# Services bind directly to host ports (no port mapping needed):
#   app         → :8000
#   clickhouse  → :8123, :9000
#   postgres    → :5432
#   redis       → :6379
#   qdrant      → :6333, :6334
#   openwebui   → :8080  (http://localhost:8080)

services:
  # ── Application ──
  app:
    network_mode: host
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_IMAGE_REGISTRY: ${PUBLIC_IMAGE_REGISTRY}
        LOCAL_ARTIFACTORY_ADDRESS: ${LOCAL_ARTIFACTORY_ADDRESS}
        PIP_REPO_URL: ${PIP_REPO_URL}
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # With bridge networking, use service names
      CLICKHOUSE__HOST: 127.0.0.1
      POSTGRES__HOST: 127.0.0.1
      REDIS__HOST: 127.0.0.1
      QDRANT__HOST: 127.0.0.1
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse-init:
        condition: service_completed_successfully
    volumes:
      - ./artifacts:/app/artifacts
    restart: unless-stopped

  # ── ClickHouse ──
  clickhouse:
    image: clickhouse/clickhouse-server:26.2
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--host",
          "127.0.0.1",
          "--query",
          "SELECT 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    network_mode: host

  # ── ClickHouse Init (one-shot seeder) ──
  clickhouse-init:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_IMAGE_REGISTRY: ${PUBLIC_IMAGE_REGISTRY}
        LOCAL_ARTIFACTORY_ADDRESS: ${LOCAL_ARTIFACTORY_ADDRESS}
        PIP_REPO_URL: ${PIP_REPO_URL}
    command:
      [
        "python",
        "-c",
        "from integrations.clickhouse.seed import seed_clickhouse_sync; from settings import get_settings; seed_clickhouse_sync(get_settings().clickhouse)",
      ]
    env_file:
      - .env
    environment:
      # With bridge networking, use service name
      CLICKHOUSE__HOST: 127.0.0.1
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"
    network_mode: host

  # ── PostgreSQL (LangGraph checkpointer) ──
  postgres:
    image: postgres:18.1
    environment:
      POSTGRES_DB: r2_db2_checkpoints
      POSTGRES_USER: r2-db2
      POSTGRES_PASSWORD: r2_db2_secret
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U r2-db2 -d r2_db2_checkpoints"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    network_mode: host

  # ── Redis (caching) ──
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    network_mode: host

  # ── Qdrant (semantic search) ──
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    network_mode: host

  # ── Open WebUI ──
  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.8.5
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    environment:
      # Disable Ollama (we don't use it)
      - ENABLE_OLLAMA_API=false
      # OpenRouter as default for general-purpose LLM chat
      - OPENAI_API_BASE_URLS=${OPENAI_API_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENAI_API_KEYS=${OPENAI_API_KEY:-}
      # Enable API keys for programmatic access
      - ENABLE_API_KEYS=true
      # Disable signup after admin is created
      - ENABLE_SIGNUP=true
      - DEFAULT_USER_ROLE=user
      # Webui name
      - WEBUI_NAME=R2-DB2 Analytics
    depends_on:
      app:
        condition: service_healthy

volumes:
  clickhouse-data:
  clickhouse-logs:
  postgres-data:
  redis-data:
  qdrant-data:
  open-webui:
