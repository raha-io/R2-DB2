services:
  # ── Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SERVER__PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      CLICKHOUSE__HOST: clickhouse
      POSTGRES__HOST: postgres
      REDIS__HOST: redis
      QDRANT__HOST: qdrant
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse-init:
        condition: service_completed_successfully
    volumes:
      - ./artifacts:/app/artifacts
    restart: unless-stopped
    networks:
      - r2-db2-net

  # ── ClickHouse ──
  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - r2-db2-net

  # ── ClickHouse Init (one-shot seeder) ──
  clickhouse-init:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-c", "from integrations.clickhouse.seed import seed_clickhouse_sync; from config.settings import get_settings; seed_clickhouse_sync(get_settings().clickhouse)"]
    env_file:
      - .env
    environment:
      CLICKHOUSE__HOST: clickhouse
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"
    networks:
      - r2-db2-net

  # ── PostgreSQL (LangGraph checkpointer) ──
  postgres:
    image: postgres:18.3
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: r2_db2_checkpoints
      POSTGRES_USER: r2-db2
      POSTGRES_PASSWORD: r2_db2_secret
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U r2-db2 -d r2_db2_checkpoints"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - r2-db2-net

  # ── Redis (caching) ──
  redis:
    image: redis:8.6.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - r2-db2-net

  # ── Qdrant (semantic search) ──
  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - r2-db2-net

  # ── Open WebUI ──
  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.9.2
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    networks:
      - r2-db2-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      # Disable Ollama (we don't use it)
      - ENABLE_OLLAMA_API=false
      # OpenRouter + local R2-DB2 analyst (semicolon-separated)
      - OPENAI_API_BASE_URLS=http://app:8000/v1;${OPENAI_API_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENAI_API_KEYS=sk-dummy;${OPENAI_API_KEY:-}
      # Enable API keys for programmatic access
      - ENABLE_API_KEYS=true
      # Allow signup; new users default to plain user role
      - ENABLE_SIGNUP=true
      - DEFAULT_USER_ROLE=user
      - WEBUI_NAME=R2-DB2 Analytics
      # Default admin credentials (auto-created on first startup when no users exist)
      - WEBUI_ADMIN_EMAIL=${OPENWEBUI_ADMIN_EMAIL:-admin@admin.com}
      - WEBUI_ADMIN_PASSWORD=${OPENWEBUI_ADMIN_PASSWORD:-admin}
      # Disable background LLM calls that would consume the graph's paused
      # interrupt state before the user's real clarification reply arrives.
      - ENABLE_TITLE_GENERATION=False
      - ENABLE_TAGS_GENERATION=False
      - ENABLE_FOLLOW_UP_GENERATION=False
      - ENABLE_AUTOCOMPLETE_GENERATION=False
      # Ensure env vars take precedence over DB-persisted config
      - ENABLE_PERSISTENT_CONFIG=False
    depends_on:
      app:
        condition: service_healthy

volumes:
  clickhouse-data:
  clickhouse-logs:
  postgres-data:
  redis-data:
  qdrant-data:
  open-webui:

networks:
  r2-db2-net:
    driver: bridge
